<svg viewBox="0 0 70 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer shield border -->
  <path d="M35 1 L69 12 L69 46 Q69 68 35 80 Q1 68 1 46 L1 12 Z" fill="#B8860B"/>
  <!-- Inner shield fill - dark gold gradient feel -->
  <path d="M35 6 L64 16 L64 46 Q64 65 35 75 Q6 65 6 46 L6 16 Z" fill="#1a1400"/>
  <!-- Diagonal gold stripes (Lamborghini's classic shield look) -->
  <g opacity="0.15">
    <rect x="0" y="20" width="100" height="8" fill="#C8A020" transform="rotate(-45,35,40)"/>
    <rect x="0" y="36" width="100" height="8" fill="#C8A020" transform="rotate(-45,35,40)"/>
  </g>
  <!-- Bull silhouette (charging, simplified) -->
  <g fill="#C8A020">
    <!-- Body -->
    <ellipse cx="35" cy="44" rx="16" ry="10"/>
    <!-- Head -->
    <ellipse cx="22" cy="38" rx="9" ry="7"/>
    <!-- Horns -->
    <path d="M15 32 Q8 24 14 20 Q18 28 20 33 Z" fill="#C8A020"/>
    <path d="M29 33 Q30 22 38 20 Q36 28 31 33 Z" fill="#C8A020"/>
    <!-- Legs -->
    <rect x="24" y="52" width="5" height="12" rx="2.5" fill="#C8A020"/>
    <rect x="32" y="52" width="5" height="12" rx="2.5" fill="#C8A020"/>
    <rect x="40" y="52" width="5" height="11" rx="2.5" fill="#C8A020"/>
    <rect x="46" y="50" width="5" height="10" rx="2.5" fill="#C8A020" transform="rotate(10,48,55)"/>
    <!-- Tail -->
    <path d="M51 40 Q60 34 58 28" fill="none" stroke="#C8A020" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Gold border frame -->
  <path d="M35 1 L69 12 L69 46 Q69 68 35 80 Q1 68 1 46 L1 12 Z" fill="none" stroke="#C8A020" stroke-width="2"/>
</svg>
